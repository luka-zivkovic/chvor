name: Desktop Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: windows
          - runner: macos-14
            target: macos
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @chvor/shared build

      - name: Sync version from git tag
        working-directory: apps/desktop
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const f = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(f, 'utf8'));
            c.version = '$VERSION';
            fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
          "
          echo "Tauri version set to $VERSION"

      # macOS: import signing certificate (optional — skipped if secrets not configured)
      - name: Import Apple certificate
        if: matrix.target == 'macos' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # Build Tauri app (signing only — notarization is a separate step)
      - name: Build desktop app
        working-directory: apps/desktop
        timeout-minutes: 30
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ "${{ matrix.target }}" = "macos" ]; then
            pnpm tauri build --target universal-apple-darwin --bundles app
          else
            pnpm tauri build
          fi
        shell: bash

      # Verify code signature (macOS)
      - name: Verify code signature
        if: matrix.target == 'macos'
        shell: bash
        run: |
          APP_PATH="apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/Chvor.app"
          echo "Verifying code signature..."
          codesign -v --deep --strict "$APP_PATH" && echo "Code signature valid" || echo "WARNING: Code signature verification failed"

      # Notarize as a separate step with explicit timeout
      - name: Notarize app
        if: matrix.target == 'macos' && env.APPLE_ID != ''
        timeout-minutes: 15
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          APP_PATH="apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/Chvor.app"

          # Create a zip for notarization submission
          ditto -c -k --keepParent "$APP_PATH" Chvor-notarize.zip

          echo "Submitting for notarization..."
          xcrun notarytool submit Chvor-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_PATH"

          rm -f Chvor-notarize.zip
          echo "Notarization complete"

      # Re-create DMG with classic layout (app left → Applications right)
      # Tauri's built-in DMG styling uses AppleScript which hangs in headless CI,
      # so we use create-dmg instead.
      - name: Create styled DMG
        if: matrix.target == 'macos'
        shell: bash
        run: |
          brew install create-dmg
          BUNDLE_DIR="apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle"
          APP_PATH="$BUNDLE_DIR/macos/Chvor.app"
          DMG_DIR="$BUNDLE_DIR/dmg"
          mkdir -p "$DMG_DIR"
          rm -f "$DMG_DIR"/*.dmg
          # create-dmg exits 2 when DMG is created but icon positioning fails (expected in headless CI)
          create-dmg \
            --volname "Chvor" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "Chvor.app" 180 170 \
            --app-drop-link 480 170 \
            "$DMG_DIR/Chvor.dmg" \
            "$APP_PATH" || test $? -eq 2

      # Upload artifacts
      - name: Upload Windows artifacts
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS artifacts
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  publish-desktop:
    needs: build-desktop
    if: needs.build-desktop.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-assets
          pattern: desktop-*
          merge-multiple: true

      - name: Generate updater JSON
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Find the macOS .tar.gz signature
          MAC_SIG=$(cat desktop-assets/*.app.tar.gz.sig 2>/dev/null || echo "")

          # Find the Windows MSI/NSIS signature (if generated)
          WIN_SIG=$(cat desktop-assets/*.msi.sig 2>/dev/null || echo "")

          cat > desktop-assets/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the release notes on GitHub.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/luka-zivkovic/chvor/releases/download/${VERSION}/Chvor.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/luka-zivkovic/chvor/releases/download/${VERSION}/Chvor_${VERSION#v}_x64-setup.exe"
              }
            }
          }
          EOF

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-assets/**/*.msi
            desktop-assets/**/*.exe
            desktop-assets/**/*.dmg
            desktop-assets/**/*.app.tar.gz
            desktop-assets/**/*.app.tar.gz.sig
            desktop-assets/latest.json
