services:
  chvor:
    build: .
    image: ghcr.io/luka-zivkovic/chvor:latest
    ports:
      - "${PORT:-9147}:9147"
    volumes:
      - chvor-data:/home/node/.chvor
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(`http://localhost:${process.env.PORT||9147}/api/pulse`).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chvor-data:
