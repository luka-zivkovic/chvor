<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <!-- Subtle radial gradient background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1720"/>
    </radialGradient>
    <!-- Glow for the arrow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="660" height="400" fill="url(#bg)"/>

  <!-- Very subtle grid dots -->
  <g opacity="0.04" fill="#ffffff">
    <circle cx="30" cy="30" r="0.8"/>
    <circle cx="70" cy="30" r="0.8"/>
    <circle cx="110" cy="30" r="0.8"/>
    <circle cx="150" cy="30" r="0.8"/>
    <circle cx="190" cy="30" r="0.8"/>
    <circle cx="230" cy="30" r="0.8"/>
    <circle cx="270" cy="30" r="0.8"/>
    <circle cx="310" cy="30" r="0.8"/>
    <circle cx="350" cy="30" r="0.8"/>
    <circle cx="390" cy="30" r="0.8"/>
    <circle cx="430" cy="30" r="0.8"/>
    <circle cx="470" cy="30" r="0.8"/>
    <circle cx="510" cy="30" r="0.8"/>
    <circle cx="550" cy="30" r="0.8"/>
    <circle cx="590" cy="30" r="0.8"/>
    <circle cx="630" cy="30" r="0.8"/>
  </g>

  <!-- Directional arrow: app icon → Applications folder -->
  <g filter="url(#glow)" opacity="0.5">
    <!-- Dashed arrow line -->
    <line x1="248" y1="190" x2="398" y2="190" stroke="#3d8b8b" stroke-width="1.5" stroke-dasharray="8,6" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="404,190 392,183 392,197" fill="#3d8b8b"/>
  </g>

  <!-- Bottom text -->
  <text x="330" y="340" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="13" fill="#ffffff" opacity="0.35" letter-spacing="0.5">
    Drag Chvor to Applications to install
  </text>

  <!-- Subtle bottom border accent -->
  <rect x="240" y="365" width="180" height="1" rx="0.5" fill="#3d8b8b" opacity="0.2"/>
</svg>
